<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #04040a;
            --bg1: #080810;
            --bg2: #0d0d1a;
            --bg3: #121225;
            --border: rgba(120, 80, 255, 0.12);
            --border2: rgba(120, 80, 255, 0.22);
            --purple: #7850ff;
            --purple2: #a07aff;
            --purple3: #c8b0ff;
            --cyan: #00e5c8;
            --cyan2: #00b89f;
            --amber: #ffb930;
            --text: #eeeeff;
            --text2: #9090b8;
            --text3: #50507a;
            --green: #22d680;
            --red: #ff4d6a;
            --card-bg: linear-gradient(135deg, rgba(120, 80, 255, 0.06) 0%, rgba(0, 229, 200, 0.03) 100%);
            --glow: 0 0 40px rgba(120, 80, 255, 0.15), 0 0 80px rgba(0, 229, 200, 0.05);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(120, 80, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(0, 229, 200, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
        }

        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(4, 4, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
            box-shadow: 0 0 20px rgba(120, 80, 255, 0.4);
        }

        .nav-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, var(--text), var(--purple3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-sub {
            font-size: 10px;
            color: var(--text3);
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .network-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(0, 229, 200, 0.06);
            border: 1px solid rgba(0, 229, 200, 0.15);
            border-radius: 99px;
            font-size: 11px;
            color: var(--cyan);
            font-family: 'Space Mono', monospace;
        }

        .network-dot {
            width: 6px;
            height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border2);
            background: rgba(120, 80, 255, 0.08);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .btn:hover {
            background: rgba(120, 80, 255, 0.18);
            border-color: var(--purple);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple), #5530dd);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 20px rgba(120, 80, 255, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 30px rgba(120, 80, 255, 0.5);
            background: linear-gradient(135deg, #8860ff, #6640ee);
        }

        .btn-cyan {
            background: rgba(0, 229, 200, 0.1);
            border-color: rgba(0, 229, 200, 0.3);
            color: var(--cyan);
        }

        .btn-cyan:hover {
            background: rgba(0, 229, 200, 0.2);
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            position: relative;
            z-index: 2;
        }

        .hero {
            text-align: center;
            padding: 80px 24px 40px;
            position: relative;
            z-index: 2;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            background: rgba(120, 80, 255, 0.1);
            border: 1px solid var(--border2);
            border-radius: 99px;
            font-size: 11px;
            color: var(--purple2);
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .hero h1 {
            font-size: clamp(36px, 6vw, 58px);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, var(--purple3) 50%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 16px;
            color: var(--text2);
            max-width: 440px;
            margin: 0 auto 36px;
            line-height: 1.7;
            font-weight: 300;
        }

        .hero-features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .hero-feat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text2);
        }

        .feat-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .feat-dot.purple {
            background: var(--purple);
        }

        .feat-dot.cyan {
            background: var(--cyan);
        }

        .feat-dot.amber {
            background: var(--amber);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 80, 255, 0.4), rgba(0, 229, 200, 0.3), transparent);
        }

        .card-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text3);
            font-family: 'Space Mono', monospace;
        }

        .char-top {
            padding: 24px 22px 0;
            display: flex;
            align-items: flex-start;
            gap: 18px;
        }

        .char-avatar {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.3), rgba(0, 229, 200, 0.2));
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.2);
        }

        .char-meta {
            flex: 1;
        }

        .char-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .char-addr {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 10px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Space Mono', monospace;
        }

        .badge-purple {
            background: rgba(120, 80, 255, 0.15);
            color: var(--purple2);
            border: 1px solid rgba(120, 80, 255, 0.25);
        }

        .badge-cyan {
            background: rgba(0, 229, 200, 0.1);
            color: var(--cyan);
            border: 1px solid rgba(0, 229, 200, 0.2);
        }

        .badge-amber {
            background: rgba(255, 185, 48, 0.1);
            color: var(--amber);
            border: 1px solid rgba(255, 185, 48, 0.2);
        }

        .badge-green {
            background: rgba(34, 214, 128, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 214, 128, 0.2);
        }

        .xp-section {
            padding: 18px 22px;
        }

        .xp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .xp-current {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            color: var(--text);
        }
